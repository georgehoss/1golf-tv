# Heap kept modest so the Gradle daemon + parent flutter process both fit in RAM;
# oversized values (e.g. -Xmx8G/Metaspace4G) starve fork() on 16-18GB machines and
# break the nested flutter subprocess with "A problem occurred starting process".
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
